<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraderEval — tradereval.com | Know Who You Are as a Trader</title>
  <meta name="description" content="30-day trader behavior simulation. No funding, no prop firm. Action-based evaluation, waitlist open at tradereval.com." />
  <link rel="canonical" href="https://tradereval.com/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark">TE</div>
        <div>
          <strong>TraderEval</strong>
          <span>Evaluation only</span>
        </div>
      </div>
      <nav class="nav" id="main-nav">
        <button class="nav-item active" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="evaluation">Full Evaluation</button>
        <button class="nav-item" data-view="quizzes">Quizzes</button>
        <button class="nav-item" data-view="journal">AI Journal</button>
        <button class="nav-item" data-view="profile">Trader Profile</button>
      </nav>
      <div class="sidebar-footer">
        <p>No funding · No prop firm · No payouts</p>
        <p class="muted">Measure skill. Fix gaps. Repeat.</p>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-actions">
          <button class="btn waitlist-btn" id="waitlist-top-btn" type="button">
            <span id="waitlist-count-badge">Join waitlist</span>
          </button>
          <span class="overall-badge" id="overall-badge">—</span>
        </div>
      </header>

      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="modal hidden" id="modal">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel" id="modal-panel"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
