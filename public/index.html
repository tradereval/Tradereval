<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraderEval — Institutional trader assessment</title>
  <meta name="description" content="Measure trading discipline before capital is at risk. Real XAUUSD, multi-timeframe analysis, and AI behavioral reporting." />
  <link rel="canonical" href="https://tradereval.com/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <meta name="theme-color" content="#0a1628" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/main.css?v=15" />
</head>
<body>
  <div id="splash" class="splash-screen" role="dialog" aria-label="Welcome to TraderEval">
    <div class="splash-inner">
      <div class="splash-logo-wrap">
        <img class="splash-logo" src="assets/logo.svg" width="88" height="88" alt="TraderEval" />
      </div>
      <p class="splash-welcome">Institutional trader assessment</p>
      <h1 class="splash-title">TraderEval</h1>
      <p class="splash-tagline">Discipline before capital — <strong>measure your edge</strong></p>
      <button type="button" class="splash-skip">Continue</button>
    </div>
  </div>

  <div id="app" class="app-hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img class="brand-logo" src="assets/logo.svg" width="48" height="48" alt="" />
        <div class="brand-text">
          <strong>TraderEval</strong>
          <span>Discipline · Execution · Performance</span>
        </div>
      </div>
      <nav class="nav" id="main-nav">
        <button class="nav-item active" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="evaluation">Full Evaluation</button>
        <button class="nav-item" data-view="quizzes">Quizzes</button>
        <button class="nav-item" data-view="journal">AI Journal</button>
        <button class="nav-item" data-view="profile">Trader Profile</button>
      </nav>
      <div class="sidebar-footer">
        <p>No funding · No prop firm · No payouts</p>
        <p class="muted">Institutional assessment only.</p>
      </div>
    </aside>

    <main class="main">
      <div class="top-tagline">
        Real XAUUSD data · Six timeframes · Behavioral assessment before live risk
      </div>
      <header class="topbar">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-actions">
          <button class="auth-badge" id="auth-badge" type="button">Create account</button>
          <button class="btn waitlist-btn" id="waitlist-top-btn" type="button">
            <span id="waitlist-count-badge">Join waitlist</span>
          </button>
          <span class="overall-badge" id="overall-badge">—</span>
        </div>
      </header>

      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="modal hidden" id="modal">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel" id="modal-panel"></div>
  </div>

  <script type="module" src="js/app.js?v=17"></script>
</body>
</html>
