<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TraderEval — tradereval.com | Know Who You Are as a Trader</title>
  <meta name="description" content="Test your skills before risking your capital. AI-powered trader training — stabilize your execution before you risk real money. tradereval.com" />
  <link rel="canonical" href="https://tradereval.com/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <meta name="theme-color" content="#030303" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="css/main.css?v=9" />
</head>
<body>
  <div id="splash" class="splash-screen" role="dialog" aria-label="Welcome to TraderEval">
    <div class="splash-inner">
      <div class="splash-logo-wrap">
        <img class="splash-logo" src="assets/logo.svg" width="88" height="88" alt="TraderEval" />
      </div>
      <p class="splash-welcome">Welcome</p>
      <h1 class="splash-title">TraderEval</h1>
      <p class="splash-tagline">Before you risk — <strong>test your skills</strong></p>
      <button type="button" class="splash-skip">Enter</button>
    </div>
  </div>

  <div id="app" class="app-hidden">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img class="brand-logo" src="assets/logo.svg" width="48" height="48" alt="" />
        <div class="brand-text">
          <strong>TraderEval</strong>
          <span>Train · Execute · Win</span>
        </div>
      </div>
      <nav class="nav" id="main-nav">
        <button class="nav-item active" data-view="dashboard">Dashboard</button>
        <button class="nav-item" data-view="evaluation">Full Evaluation</button>
        <button class="nav-item" data-view="quizzes">Quizzes</button>
        <button class="nav-item" data-view="journal">AI Journal</button>
        <button class="nav-item" data-view="profile">Trader Profile</button>
      </nav>
      <div class="sidebar-footer">
        <p>No funding · No prop firm · No payouts</p>
        <p class="muted">Measure skill. Fix gaps. Repeat.</p>
      </div>
    </aside>

    <main class="main">
      <div class="top-tagline">
        <span class="tagline-gem">◆</span>
        Real XAUUSD · Multi-timeframe charts · Discipline before dollars
        <span class="tagline-gem">◆</span>
      </div>
      <header class="topbar">
        <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
        <div class="topbar-title" id="page-title">Dashboard</div>
        <div class="topbar-actions">
          <button class="auth-badge" id="auth-badge" type="button">Sign up free</button>
          <button class="btn waitlist-btn" id="waitlist-top-btn" type="button">
            <span id="waitlist-count-badge">Join waitlist</span>
          </button>
          <span class="overall-badge" id="overall-badge">—</span>
        </div>
      </header>

      <div class="content" id="content"></div>
    </main>
  </div>

  <div class="modal hidden" id="modal">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-panel" id="modal-panel"></div>
  </div>

  <script type="module" src="js/app.js?v=13"></script>
</body>
</html>
